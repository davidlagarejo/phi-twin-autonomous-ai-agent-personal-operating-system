version: "3.8"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: phi-searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng-config:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8888
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
