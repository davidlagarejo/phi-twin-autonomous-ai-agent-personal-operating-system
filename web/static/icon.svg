<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <!-- Sky gradient: deep navy at top, dark indigo at bottom -->
    <linearGradient id="sky" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"   stop-color="#060d2e"/>
      <stop offset="100%" stop-color="#0f1a4a"/>
    </linearGradient>

    <!-- Rocket body: clean white with subtle warm tint -->
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#d8dff0"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b0bbdd"/>
    </linearGradient>

    <!-- Flame: white core → yellow → orange → transparent -->
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#ffe066"/>
      <stop offset="60%"  stop-color="#ff7a00" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer glow -->
    <radialGradient id="glow" cx="50%" cy="100%" r="50%">
      <stop offset="0%"   stop-color="#ff8800" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>

    <!-- Smoke haze at base -->
    <radialGradient id="smoke" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#8899bb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8899bb" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="round">
      <rect width="512" height="512" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="22" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="15" cy="12" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="28" cy="8"  r="0.6" fill="white" opacity="0.5"/>
  <circle cx="72" cy="10" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="85" cy="18" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="20" cy="30" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="82" cy="35" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="10" cy="55" r="0.5" fill="white" opacity="0.3"/>

  <!-- Glow halo from engine (behind everything) -->
  <ellipse cx="50" cy="82" rx="30" ry="12" fill="url(#glow)"/>

  <!-- Smoke clouds at base -->
  <ellipse cx="38" cy="85" rx="14" ry="7" fill="url(#smoke)"/>
  <ellipse cx="62" cy="85" rx="14" ry="7" fill="url(#smoke)"/>

  <!-- Flame (drawn behind rocket body) -->
  <path d="M45.5 67 Q47 80 50 90 Q53 80 54.5 67 Z" fill="url(#flame)"/>
  <!-- Secondary inner flame -->
  <path d="M47.5 67 Q49 76 50 83 Q51 76 52.5 67 Z" fill="white" opacity="0.7"/>

  <!-- Left fin -->
  <path d="M44.5 62 L38 72 L44.5 68 Z" fill="url(#body)" opacity="0.9"/>
  <!-- Right fin -->
  <path d="M55.5 62 L62 72 L55.5 68 Z" fill="url(#body)" opacity="0.9"/>

  <!-- Rocket body (tall ellipse) -->
  <ellipse cx="50" cy="45" rx="6.5" ry="22" fill="url(#body)"/>

  <!-- Nose cone -->
  <path d="M43.5 37 Q50 10 56.5 37 Z" fill="url(#body)"/>

  <!-- Nose cone highlight -->
  <path d="M47 33 Q50 14 51.5 33" fill="none" stroke="white" stroke-width="0.6" opacity="0.5"/>

  <!-- Interstage band (thin dark stripe) -->
  <rect x="43.5" y="53" width="13" height="2.5" rx="1" fill="#1a2a5e" opacity="0.7"/>

  <!-- Window -->
  <circle cx="50" cy="41" r="3.5" fill="#0a1535"/>
  <circle cx="50" cy="41" r="2.5" fill="#4cc9f0" opacity="0.9"/>
  <!-- Window highlight -->
  <circle cx="49" cy="40" r="0.8" fill="white" opacity="0.6"/>

  <!-- Engine nozzle -->
  <ellipse cx="50" cy="67" rx="5" ry="2" fill="#1a2a5e"/>
  <ellipse cx="50" cy="67" rx="3.5" ry="1.3" fill="#0d1730"/>
</svg>
